# 提取出多个服务共用的基础镜像和构建配置
x-tailchat-base: &tailchat-base
  # 运行机只允许 pull 镜像，不允许 build（避免新服务器“又开始编译”）
  # 可通过环境变量 IMAGE_TAG 指定版本，不指定则默认 latest：
  #   IMAGE_TAG=20260423-1816 docker compose up -d
  image: athendrakomin/caifu-chat:${IMAGE_TAG:-latest}
  restart: unless-stopped
  env_file: docker-compose.env
  depends_on:
    - mongo
    - redis
    - minio
  networks:
    - internal

services:
  # Tailchat Core Services
  service-core:
    <<: *tailchat-base
    environment:
      SERVICES: core/gateway,core/user/*.service.js,core/group/*.service.js,core/chat/*.service.js,core/file,core/plugin/registry,core/config
      PORT: 3000
    # 可观测性：Prometheus metrics（仅本机暴露，需配合 docker-compose.env: PROMETHEUS=true）
    ports:
      - "127.0.0.1:13030:13030"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-gw.rule=PathPrefix(`/`)"
      - "traefik.http.routers.api-gw.entrypoints=web"
      - "traefik.http.routers.api-gw.priority=1"
      - "traefik.http.services.api-gw.loadbalancer.server.port=3000"

  # Open Platform
  service-openapi:
    <<: *tailchat-base
    environment:
      SERVICES: openapi/app,openapi/bot,openapi/integration,openapi/oidc/oidc
      OPENAPI_PORT: 3003
      OPENAPI_UNDER_PROXY: "true"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openapi-oidc.rule=PathPrefix(`/open`)"
      - "traefik.http.services.openapi-oidc.loadbalancer.server.port=3003"

  # Plugin Service (All Plugins)
  service-all-plugins:
    <<: *tailchat-base
    depends_on:
      - mongo
      - redis
      - minio
      - livekit
    environment:
      SERVICEDIR: plugins
      # 只加载“免费且必需”的插件服务，避免无关插件缺少 env 或不兼容导致容器反复重启
      SERVICES: plugins/com.msgbyte.pseudolive/services/*.service.js,plugins/com.msgbyte.livekit/services/*.service.js

  # Admin Panel
  tailchat-admin:
    <<: *tailchat-base
    command: pnpm start:admin
    environment:
      PORT: 3000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.rule=PathPrefix(`/admin`)"
      - "traefik.http.routers.admin.priority=100"
      - "traefik.http.services.admin.loadbalancer.server.port=3000"

  # LiveKit Server (Open Source)
  # - 提供 WebRTC SFU，用于私信语音通话
  # - 说明：若要在复杂网络/移动网络更稳定，通常还需要 TURN（可后续增加）
  livekit:
    image: livekit/livekit-server:latest
    command: --dev
    restart: unless-stopped
    networks:
      - internal
    ports:
      - "7880:7880"
      - "7881:7881/tcp"
      - "50000-50100:50000-50100/udp"
  # Database
  mongo:
    image: mongo:4
    restart: on-failure
    volumes:
      - data:/data/db
    networks:
      - internal

  # Data cache and Transporter
  redis:
    image: redis:alpine
    restart: on-failure
    networks:
      - internal

  # Persist Storage
  minio:
    image: minio/minio
    restart: on-failure
    networks:
      - internal
    env_file: docker-compose.env
    volumes:
      - storage:/data
    command: minio server /data --console-address ":9001"

  # Router
  traefik:
    image: traefik:v2.11
    restart: unless-stopped
    command:
      - "--api.insecure=true" # Re-enabled temporarily as it is required by the health check script.
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entryPoints.web.address=:80"
      # 生产建议：只信任你自己的反代（默认仅 localhost）
      # 如使用 Cloudflare/Nginx 等，可在 docker-compose.env 中设置：
      #   TRAEFIK_TRUSTED_PROXIES=127.0.0.1/32,10.0.0.0/8
      - "--entryPoints.web.forwardedHeaders.trustedIPs=${TRAEFIK_TRUSTED_PROXIES:-127.0.0.1/32}"
    ports:
      - 11000:80
      - 127.0.0.1:11001:8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - internal
      - default

networks:
  internal:
    name: tailchat-internal

volumes:
  data:
  storage:
